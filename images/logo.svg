           Q39 26 39 30 Q39 34 39 36 Q39 42 33 42 H26 V38 H32 Q34 38 34 36
           Q34 34 33 34 L29 33 Q27 32 27 28 Z"
        fill="#FFB800"/>

  <!-- K (blanc) -->
