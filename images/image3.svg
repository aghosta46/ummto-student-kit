<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB800" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#F8F7F2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Sol -->
  <rect x="0" y="380" width="800" height="120" fill="#0F2A5C" opacity=".08"/>

  <!-- Bâtiment central (campus) -->
  <rect x="280" y="180" width="240" height="200" fill="#0F2A5C"/>
  <polygon points="270,180 400,120 530,180" fill="#FFB800"/>
  <!-- Fenêtres -->
  <rect x="305" y="210" width="30" height="40" fill="#FFB800" opacity=".9"/>
  <rect x="355" y="210" width="30" height="40" fill="#FFB800" opacity=".9"/>
  <rect x="405" y="210" width="30" height="40" fill="#FFB800" opacity=".9"/>
  <rect x="455" y="210" width="30" height="40" fill="#FFB800" opacity=".9"/>
  <rect x="305" y="270" width="30" height="40" fill="#FFB800" opacity=".7"/>
  <rect x="355" y="270" width="30" height="40" fill="#FFB800" opacity=".7"/>
  <rect x="405" y="270" width="30" height="40" fill="#FFB800" opacity=".7"/>
  <rect x="455" y="270" width="30" height="40" fill="#FFB800" opacity=".7"/>
  <!-- Porte -->
  <rect x="385" y="335" width="30" height="45" fill="#FFFFFF"/>

  <!-- Bâtiments latéraux -->
  <rect x="160" y="240" width="100" height="140" fill="#0F2A5C" opacity=".85"/>
  <rect x="540" y="240" width="100" height="140" fill="#0F2A5C" opacity=".85"/>

  <!-- Texte -->
  <text x="400" y="445" text-anchor="middle"
        fill="#0F2A5C" font-family="Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="1">
    UMMTO — Tizi-Ouzou
  </text>
  <text x="400" y="470" text-anchor="middle"
        fill="#0F2A5C" font-family="Arial, sans-serif"
        font-size="13" opacity=".7">
    Université Mouloud Mammeri
  </text>
</svg>
